example=Example: 
example_create1= --create --output test.hpk --installfile test.apk --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --vendor "My Company"
example_create2= --create --output test.hpk --installfile test.apk --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --vendor "My Company" --subactivity1 1234abcd-1234-1234-0000-12345678abce,com.hp.workpath.sample.testsample/com.hp.workpath.sample.testsample.SubActivity
example_create3= --create --output test.hpk --installfile test.apk --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --vendor "My Company" --defaultconfig test.json
example_create4= --create --output test.hpk --installfile button.xml --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --vendor "My Company"
example_create5= --create --output test.hpk --installfile test.apk --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --vendor "My Company" --linkauthagent -p:name={"\\"en-US"\\":"\\"usName"\\","\\"ko-KR"\\":"\\"krName"\\"} -p:description={"\\"en-US"\\":"\\"usDes"\\","\\"ko-KR"\\":"\\"krDes"\\"} -p:url=package/activity -p:preprompt=false
example_create6= --create --output test.hpk --installfile test.apk --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --vendor "My Company" --home true --default true
example_create7= --create --output test.hpk --installfile test.apk --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --vendor "My Company" --accessory1 OWNED,1008,69,NULL --accessory2 "SHARED,7590,272, "
example_create8= --create --output test.hpk --installfile test.apk --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --vendor "My Company" --platformversion 29.7
example_create9= --create --output test.hpk --installfile test.apk --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --vendor "My Company" --statisticsagent -s:name={"\\"en-US"\\":"\\"usName"\\","\\"ko-KR"\\":"\\"krName"\\"} -s:description={"\\"en-US"\\":"\\"usDes"\\","\\"ko-KR"\\":"\\"krDes"\\"} -s:ackrequiredfordelete=false
example_create10= --create --output test.hpk --installfile test.apk --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --vendor "My Company" --schemaversion v2.5
example_create11= --create --output test.hpk --installfile test.apk --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --vendor "My Company" --webservice -w:name={"\\"en-US"\\":"\\"usName"\\","\\"ko-KR"\\":"\\"krName"\\"} -w:description={"\\"en-US"\\":"\\"usDes"\\","\\"ko-KR"\\":"\\"krDes"\\"} -w:endpoint=get,com.hp.workpath.sample.webservice,com.hp.workpath.sample.webservice.services.WebServiceTask,none:delete,com.hp.workpath.sample.webservice,com.hp.workpath.sample.webservice.services.WebServiceTask,x-auth
example_xml= --xml --output test.hpk --installfile test.apk --manifest hpk.xml\n
example_xml_web= --xml --output test.hpk --installfile button.xml --manifest hpk.xml\n
example_install= --install --installfile test.hpk --host 192.168.1.1 --password 1234\n
example_uninstall= --uninstall --uuid 1234abcd-1234-1234-0000-12345678abcd --host 192.168.1.1 --password 1234\n
example_config_get= --config-get --uuid 1234abcd-1234-1234-0000-12345678abcd --host 192.168.1.1 --password 1234\n
example_create_button= --create-button --output buttonFile.xml --uuid 1234abcd-1234-1234-0000-12345678abcd --name "Test Application" --description "Test App Description" --binding Plain --uri https://test.com\n
example_app_list= --app-list --host 192.168.1.1 --password 1234\n
example_app_detail= --app-detail --uuid 1234abcd-1234-1234-0000-12345678abcd --host 192.168.1.1 --password 1234\n
example_config_update= --config-update --uuid 1234abcd-1234-1234-0000-12345678abcd --host 192.168.1.1 --password 1234 --data "{"\\"test"\\": 123}"\n
example_provider_list= --provider-list --host 192.168.1.1 --password 1234\n
example_attestation_update= --attestation-update --uuid 1234abcd-1234-1234-0000-12345678abcd --host 192.168.1.1 --password 1234 --username test_username --ldbkey test_ldbkey --credentials "[{"\\"client_id"\\":"\\"test_client_id"\\","\\"client_secret"\\": "\\"test_client_secret"\\"}]"

